version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  NanoOrch Enterprise — Docker Compose with Docker Secrets
#
#  This file is the ENTERPRISE variant of docker-compose.secrets.yml.
#  It runs the pre-compiled V8 bytecode image (nanoorch-enterprise) so that
#  no TypeScript or JavaScript source is ever present inside the container.
#
#  Secrets flow (nothing appears in `docker inspect Env`):
#    • Secret files live on the host at ./secrets/<name>.txt (one value each).
#    • Docker mounts them read-only at /run/secrets/<name> inside the container.
#    • Only the _FILE path is visible in `docker inspect` — never the real value.
#    • entrypoint.sh reads each _FILE and exports the plain var before Node starts.
#    • The app also calls loadSecret() (server/lib/secrets.ts) for app-layer vars.
#
#  Quick start:
#    1. Generate secret files (interactive, one-time):
#         ./secrets/create-secrets.sh
#       This generates a random postgres password, encryption key, and session
#       secret, and writes the full DATABASE_URL automatically.
#
#    2. Build the enterprise bytecode image (run from project root):
#         docker build -f deploy/Dockerfile -t nanoorch-enterprise .
#
#    3. Start the stack:
#         docker compose -f deploy/docker-compose.enterprise-secrets.yml up -d
#
#    4. Tail logs:
#         docker compose -f deploy/docker-compose.enterprise-secrets.yml logs -f app
#
#    5. Verify secrets are hidden:
#         docker inspect nanoorch-enterprise-app-1 | grep -E "(SECRET|PASSWORD|KEY|URL)"
#       You should see only _FILE paths, never real values.
# ─────────────────────────────────────────────────────────────────────────────

# ── Secret file declarations ──────────────────────────────────────────────────
# Files are shared with docker-compose.secrets.yml — run create-secrets.sh once
# and both compose files can use the same ./secrets/ directory.
secrets:
  session_secret:
    file: ./secrets/session_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  database_url:
    file: ./secrets/database_url.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt


services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nanoorch_net

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:   nanoorch
      POSTGRES_USER: nanoorch
      # The postgres image reads POSTGRES_PASSWORD_FILE natively —
      # the database password is never visible in `docker inspect Env`.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanoorch -d nanoorch"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nanoorch_net

  app:
    # Pre-built enterprise image — V8 bytecode only, zero source files.
    # Build it once with:  docker build -f deploy/Dockerfile -t nanoorch-enterprise .
    image: nanoorch-enterprise
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"

    # All secrets are mounted at /run/secrets/<name> (read-only, mode 0400).
    # entrypoint.sh reads each _FILE and exports the plain env var before Node
    # starts, so libraries that bypass loadSecret() (drizzle, pg, express-session)
    # still receive the correct values without those values ever appearing in
    # `docker inspect Env`.
    secrets:
      - session_secret
      - admin_password
      - encryption_key
      - database_url
      - openai_api_key
      - anthropic_api_key
      - gemini_api_key

    environment:
      NODE_ENV:       production
      PORT:           3000
      MIGRATIONS_DIR: /app/migrations

      # Public URL — set to the full origin your identity provider will redirect
      # to (e.g. https://nanoorch.your-company.com).  Leave blank to derive from
      # X-Forwarded-Proto/Host headers (correct behind Nginx/Traefik).
      APP_URL: ${APP_URL:-}

      # ── _FILE pointers — real values are in the mounted secret files ──────────
      # `docker inspect` shows only these paths, never the actual secrets.
      DATABASE_URL_FILE:   /run/secrets/database_url
      SESSION_SECRET_FILE: /run/secrets/session_secret
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key

      AI_INTEGRATIONS_OPENAI_API_KEY_FILE:    /run/secrets/openai_api_key
      AI_INTEGRATIONS_ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      AI_INTEGRATIONS_GEMINI_API_KEY_FILE:    /run/secrets/gemini_api_key

      # ── Non-sensitive config (plain env vars are fine) ────────────────────────
      COOKIE_SECURE:  ${COOKIE_SECURE:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}

      AI_INTEGRATIONS_OPENAI_BASE_URL:    ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      AI_INTEGRATIONS_GEMINI_BASE_URL:    ${AI_INTEGRATIONS_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}

      # Docker sandbox
      DOCKER_SOCKET:   /var/run/docker.sock
      AGENT_IMAGE:     ${AGENT_IMAGE:-nanoorch-agent:latest}
      SANDBOX_IMAGE:   ${SANDBOX_IMAGE:-nanoorch-sandbox:latest}
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-runsc}
      AGENT_RUNTIME:   ${AGENT_RUNTIME:-}
      SECCOMP_PROFILE: ${SECCOMP_PROFILE:-}
      DOCKER_PROXY_URL: ${DOCKER_PROXY_URL:-}

      # Redis — optional but recommended for session store and rate limiting.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nanoorch/seccomp:/etc/nanoorch/seccomp:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/me || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nanoorch_net

volumes:
  postgres_data:
  redis_data:

networks:
  nanoorch_net:
    driver: bridge
